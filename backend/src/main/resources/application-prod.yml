spring:
  datasource:
    dynamic:
      primary: core
      strict: true
      datasource:
        core:
          url: ${CORE_DB_URL}
          username: ${CORE_DB_USERNAME}
          password: ${CORE_DB_PASSWORD}
          driver-class-name: com.mysql.cj.jdbc.Driver
        biz:
          url: ${BIZ_DB_URL}
          username: ${BIZ_DB_USERNAME}
          password: ${BIZ_DB_PASSWORD}
          driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    database: ${REDIS_DB:0}
    timeout: 3000ms

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET}

logging:
  level:
    root: warn
    com.baseproject: info

